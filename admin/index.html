<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel — 3D Printing Studio</title>
<link rel="icon" type="image/png" href="../favicon.png" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="../Logo/Logo.png" alt="Logo" />
    </div>
    <h2>Admin Panel</h2>
    <p class="login-sub">3D Printing Studio · Operations</p>
    <div class="login-form">
      <div class="field-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="admin" autocomplete="username" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p id="loginError" class="login-error"></p>
      <button class="btn-primary full" onclick="doLogin()">Sign In</button>
    </div>
    <p class="login-hint">Default: admin / admin123</p>
  </div>
</div>

<!-- ADMIN SHELL -->
<div id="adminShell" class="admin-shell hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <img src="../Logo/Logo.png" alt="Logo" class="sb-logo" />
      <button class="sb-collapse" onclick="toggleSidebar()" title="Collapse">&#8249;</button>
    </div>

    <nav class="sb-nav">
      <p class="sb-section-label">Main</p>
      <a class="sb-link active" data-page="dashboard" onclick="nav('dashboard')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="sb-link" data-page="orders" onclick="nav('orders')">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Orders</span>
        <span class="sb-badge" id="sbBadgeOrders">12</span>
      </a>
      <a class="sb-link" data-page="products" onclick="nav('products')">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        <span>Products</span>
      </a>
      <a class="sb-link" data-page="bookings" onclick="nav('bookings')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>3DSelfiy Bookings</span>
        <span class="sb-badge orange" id="sbBadgeBookings">5</span>
      </a>
      <a class="sb-link" data-page="customers" onclick="nav('customers')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Customers</span>
      </a>

      <p class="sb-section-label">Content</p>
      <a class="sb-link" data-page="inventory" onclick="nav('inventory')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Inventory</span>
      </a>
      <a class="sb-link" data-page="content" onclick="nav('content')">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Content</span>
      </a>
      <a class="sb-link" data-page="newsletter" onclick="nav('newsletter')">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Newsletter</span>
      </a>

      <p class="sb-section-label">System</p>
      <a class="sb-link" data-page="analytics" onclick="nav('analytics')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Analytics</span>
      </a>
      <a class="sb-link" data-page="settings" onclick="nav('settings')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">A</div>
        <div class="sb-user-info">
          <span class="sb-user-name" id="sbUserName">Admin</span>
          <span class="sb-user-role">Super Admin</span>
        </div>
      </div>
      <button class="sb-logout" onclick="doLogout()" title="Logout">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main-area">
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-brand-switch">
          <button class="brand-btn active" id="brandBtn1" onclick="switchBrand('studio')">3D Studio</button>
          <button class="brand-btn" id="brandBtn2" onclick="switchBrand('selfiy')">3DSelfiy</button>
        </div>
        <button class="topbar-icon" onclick="window.open('../index.html','_blank')" title="View Store">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <div class="topbar-notif" onclick="toggleNotifPanel()">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </div>
      </div>
    </header>

    <!-- PAGES -->
    <div class="page-content" id="pageContent">
      <!-- injected by JS -->
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-head">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="admin.js"></script>
</body>
</html>
